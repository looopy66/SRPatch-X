name: 构建SRPatch-X APK
# 触发规则：可根据需求自行增删
on:
  # 推送代码到main分支时自动构建
  push:
    branches: [ "main", "master" ]
  # 提交PR到main分支时自动构建
  pull_request:
    branches: [ "main", "master" ]
  # 支持手动触发构建（在Actions页面可直接点击运行）
  workflow_dispatch:
  # 发布Release时自动构建并上传APK到Release资产
  release:
    types: [ published ]

# 构建任务
jobs:
  build-apk:
    name: 构建Android APK
    runs-on: ubuntu-latest
    # 构建超时时间，避免异常占用资源
    timeout-minutes: 30

    steps:
      # 步骤1：拉取项目代码
      - name: 检出项目代码
        uses: actions/checkout@v4

      # 步骤2：配置JDK环境（Android项目需JDK17，适配最新AGP）
      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 自动缓存Gradle依赖，大幅提升二次构建速度
          cache: 'gradle'

      # 步骤3：配置Android SDK环境，自动接受许可协议
      - name: 配置Android SDK环境
        uses: android-actions/setup-android@v3

      # 步骤4：给gradlew脚本添加执行权限（解决Linux环境权限不足问题）
      - name: 添加Gradle执行权限
        run: chmod +x ./gradlew

      # 步骤5：准备APK签名配置（仅当配置了签名Secrets时执行，无配置则自动跳过）
      - name: 准备APK签名配置
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. 将base64编码的签名文件解码为keystore.jks，放在项目根目录
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          # 2. 生成signing.properties签名配置文件（适配项目自带的示例格式）
          echo "storeFile=../keystore.jks" > app/signing.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> app/signing.properties
          echo "keyAlias=$KEY_ALIAS" >> app/signing.properties
          echo "keyPassword=$KEY_PASSWORD" >> app/signing.properties

      # 步骤6：执行Gradle构建，清理旧产物+构建Release版本APK
      - name: 构建Release APK
        run: ./gradlew clean assembleRelease --stacktrace

      # 步骤7：上传构建好的APK到Action产物（可在Actions页面直接下载）
      - name: 上传APK构建产物
        uses: actions/upload-artifact@v4
        with:
          # 产物名称，可自定义
          name: SRPatch-X-Release-APK
          # APK文件路径，适配Android项目默认输出目录
          path: app/build/outputs/apk/release/*.apk
          # 产物保留时长（默认90天，可自行修改）
          retention-days: 90

      # 步骤8：发布Release时，自动将APK上传到Release资产页
      - name: 上传APK到GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && github.event.action == 'published'
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

