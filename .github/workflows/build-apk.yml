name: 构建SRPatch-X APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-apk:
    name: 构建Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 配置Android SDK环境
        uses: android-actions/setup-android@v3

      - name: 添加Gradle执行权限
        run: chmod +x ./gradlew

      # 签名配置：自动适配项目路径，全场景容错
      - name: 生成签名配置与密钥文件（自适应路径）
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. 生成 keystore.jks 到项目根目录，同时校验必填参数
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "✅ 使用自定义签名密钥"
            # 校验自定义签名的必填参数是否完整
            if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
              echo "❌ 自定义签名配置不完整：KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD 不能为空"
              exit 1
            fi
            # 解码签名文件
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            if [ ! -f keystore.jks ]; then
              echo "❌ 签名文件解码失败，请检查KEYSTORE_BASE64是否正确"
              exit 1
            fi
            STORE_PASS="$KEYSTORE_PASSWORD"
            KEY_ALIAS="$KEY_ALIAS"
            KEY_PASS="$KEY_PASSWORD"
          else
            echo "⚠️ 未配置自定义签名，自动生成临时调试密钥"
            # 一键生成调试密钥，无人工交互
            keytool -genkey -v \
              -keystore keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias debug \
              -storepass debug123 -keypass debug123 \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US" \
              -noprompt
            STORE_PASS="debug123"
            KEY_ALIAS="debug"
            KEY_PASS="debug123"
          fi

          # 2. 定位 signing.properties 目标目录，限制搜索范围避免误匹配
          # 优先在当前目录和app目录查找示例文件，最多递归2级，避免扫描无关目录
          EXAMPLE_PATH=$(find . -maxdepth 2 -name "signing.properties.example" -print -quit)
          if [ -n "$EXAMPLE_PATH" ]; then
            TARGET_DIR=$(dirname "$EXAMPLE_PATH")
            echo "✅ 找到示例配置文件：$EXAMPLE_PATH，签名配置将生成到 $TARGET_DIR 目录"
          else
            # 未找到示例文件，优先使用app目录（Android项目默认惯例）
            TARGET_DIR="app"
            echo "⚠️ 未找到 signing.properties.example，默认使用 app 目录作为目标路径"
          fi

          # 3. 计算 keystore.jks 相对于目标目录的相对路径，兼容多级目录
          # 切换到目标目录，计算到根目录keystore.jks的相对路径，兼容性拉满
          RELATIVE_PATH=""
          CURRENT_DIR="$TARGET_DIR"
          while [ "$CURRENT_DIR" != "." ] && [ "$CURRENT_DIR" != "/" ]; do
            RELATIVE_PATH="../$RELATIVE_PATH"
            CURRENT_DIR=$(dirname "$CURRENT_DIR")
          done
          STORE_FILE_PATH="${RELATIVE_PATH}keystore.jks"
          echo "✅ 计算得到 keystore.jks 相对路径：$STORE_FILE_PATH"

          # 4. 生成 signing.properties 配置文件，确保目录存在
          mkdir -p "$TARGET_DIR"
          cat > "$TARGET_DIR/signing.properties" <<-EOF
          storeFile=$STORE_FILE_PATH
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          
          echo "✅ signing.properties 已成功生成到 $TARGET_DIR/signing.properties"
          # 预览配置（隐藏敏感密码信息）
          echo "配置文件预览："
          sed 's/\(storePassword=\).*/\1******/; s/\(keyPassword=\).*/\1******/' "$TARGET_DIR/signing.properties"

      - name: 构建Release APK
        run: ./gradlew clean assembleRelease --stacktrace

      - name: 上传APK构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SRPatch-X-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: 上传APK到GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
