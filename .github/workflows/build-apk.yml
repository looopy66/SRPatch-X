name: 构建SRPatch-X APK
on:
  # 推送代码到main/master分支自动构建
  push:
    branches: [ "main", "master" ]
  # 提交PR到main/master分支自动构建
  pull_request:
    branches: [ "main", "master" ]
  # 支持手动触发构建（Actions页面可直接运行）
  workflow_dispatch:
  # 发布Release时自动构建并上传APK到Release资产
  release:
    types: [ published ]

jobs:
  build-apk:
    name: 构建Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 步骤1：拉取项目代码
      - name: 检出项目代码
        uses: actions/checkout@v4

      # 步骤2：配置JDK环境（适配项目Android Gradle Plugin要求）
      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 步骤3：配置Android SDK环境，自动接受许可协议
      - name: 配置Android SDK环境
        uses: android-actions/setup-android@v3

      # 步骤4：给gradlew脚本添加执行权限，解决Linux环境权限问题
      - name: 添加Gradle执行权限
        run: chmod +x ./gradlew

      # 步骤5：配置APK签名（仅当配置了签名Secrets时执行，无配置自动跳过）
      - name: 准备APK签名配置
        if: secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_BASE64 != null
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 解码base64签名文件到项目根目录
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          # 生成适配项目的签名配置文件，匹配项目自带的signing.properties格式
          echo "storeFile=../keystore.jks" > app/signing.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> app/signing.properties
          echo "keyAlias=$KEY_ALIAS" >> app/signing.properties
          echo "keyPassword=$KEY_PASSWORD" >> app/signing.properties

      # 步骤6：执行构建，清理旧产物+构建Release版本APK
      - name: 构建Release APK
        run: ./gradlew clean assembleRelease --stacktrace --no-daemon

      # 步骤7：上传构建产物到Actions页面，可直接下载
      - name: 上传APK构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SRPatch-X-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # 步骤8：发布Release时，自动上传APK到Release资产页
      - name: 上传APK到GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && github.event.action == 'published'
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
