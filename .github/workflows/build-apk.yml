name: 构建SRPatch-X APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-apk:
    name: 构建Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 配置Android SDK环境
        uses: android-actions/setup-android@v3

      - name: 添加Gradle执行权限
        run: chmod +x ./gradlew

      # 签名配置：优先使用自定义密钥，否则生成临时调试密钥
      - name: 生成签名配置与密钥文件
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "✅ 检测到自定义签名配置，使用用户提供的密钥文件"
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            if [ ! -f keystore.jks ]; then
              echo "❌ 签名文件解码失败，请检查KEYSTORE_BASE64是否正确"
              exit 1
            fi
            echo "storeFile=../keystore.jks" > app/signing.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> app/signing.properties
            echo "keyAlias=$KEY_ALIAS" >> app/signing.properties
            echo "keyPassword=$KEY_PASSWORD" >> app/signing.properties
            echo "✅ 自定义签名配置生成完成"
          else
            echo "⚠️ 未配置自定义签名Secrets，自动生成临时调试签名密钥"
            keytool -genkey -v \
              -keystore keystore.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias debug \
              -storepass debug123 \
              -keypass debug123 \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US" \
              -noprompt
            echo "storeFile=../keystore.jks" > app/signing.properties
            echo "storePassword=debug123" >> app/signing.properties
            echo "keyAlias=debug" >> app/signing.properties
            echo "keyPassword=debug123" >> app/signing.properties
            echo "✅ 临时调试签名配置生成完成，可正常构建APK"
          fi

      # 构建命令：移除 --no-daemon 以使用守护进程，避免无关日志干扰
      - name: 构建Release APK
        run: ./gradlew clean assembleRelease --stacktrace

      - name: 上传APK构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SRPatch-X-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: 上传APK到GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && github.event.action == 'published'
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
